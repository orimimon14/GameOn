# PR verification pipeline — docs/quality/CI_CD.md §5.
# Deploy stages (dev/staging/prod) are added in later phases once cloud projects are live.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    name: Web — typecheck, lint, test, build, bundle scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}
      - name: Rules tests
        shell: bash
        run: |
          set -o pipefail
          npm run test:rules 2>&1 | tee rules-tests.log || {
            echo "::error title=rules-tests::$(tail -c 900 rules-tests.log | tr '\n' ' ' | tr -d '\r')"
            exit 1
          }
      - run: npm run build
      - run: npm run scan:bundle

  functions:
    name: Functions — build (strict TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run build
