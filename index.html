<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Swish & Game - Find Your Squad</title>

    <!-- Canonical domain: Google sign-in state must live on the same origin
         as the OAuth-whitelisted auth handler (firebaseapp.com). Old web.app
         links redirect before the app boots. -->
    <script>
      if (location.hostname === 'swish-game-dev.web.app') {
        location.replace('https://swish-game-dev.firebaseapp.com' + location.pathname + location.search + location.hash);
      }
    </script>

    <!-- Fonts: Rubik -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body class="dark overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
